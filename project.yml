name: BrickScan
options:
  bundleIdPrefix: com.lunik
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

targets:
  BrickScan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrickScan
    info:
      path: BrickScan/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "BrickScan utilise la caméra pour scanner les boîtes et manuels LEGO"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lunik.brickscan
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 
        CODE_SIGN_STYLE: Automatic
    capabilities:
      com.apple.Keychain: {}

schemes:
  BrickScan:
    build:
      targets:
        BrickScan: all
